<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- apply saved theme before stylesheet load to avoid a flash -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") || "dark";
  </script>

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">

  {% if jekyll.environment == "production" %}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga_tag }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.ga_tag }}');
  </script>
  {% endif %}
</head>
<body>

<div id="layout">

  <header class="app-header">
    <a class="app-logo" href="{{ '/' | relative_url }}" aria-label="CalCOFI.io — home">
      <img class="logo-dark"  src="{{ '/assets/logo_calcofi.svg'       | relative_url }}" alt="CalCOFI" width="32" height="32">
      <img class="logo-light" src="{{ '/assets/logo_calcofi_light.svg' | relative_url }}" alt="CalCOFI" width="32" height="32">
    </a>
    <h1>{{ site.title }}</h1>

    <span class="spacer"></span>

    <nav class="header-links">
      <a href="#explore">explore</a>
      <a href="#data">data</a>
      <a href="#build">build</a>
      <a href="#students">students</a>
      <a href="https://calcofi.org">calcofi.org</a>
    </nav>

    <button id="theme-toggle" type="button" aria-label="Toggle dark / light theme">🌓</button>
  </header>

  <main id="panel">
    {{ content }}
    <footer class="app-footer">
      <p>
        Program · Erin Satterthwaite
        (<a href="mailto:esatterthwaite@ucsd.edu">esatterthwaite@ucsd.edu</a>)
        · Technical · Ben Best
        (<a href="mailto:ben@ecoquants.com">ben@ecoquants.com</a>)
      </p>
      <p>
        <a href="https://calcofi.org">CalCOFI.org</a>
        · <a href="https://github.com/CalCOFI">github.com/CalCOFI</a>
        · <a href="https://status.calcofi.io">status</a>
      </p>
    </footer>
  </main>

</div>

<script>
  document.getElementById("theme-toggle").addEventListener("click", () => {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    document.documentElement.dataset.theme = next;
    localStorage.setItem("theme", next);
  });
</script>
</body>
</html>
